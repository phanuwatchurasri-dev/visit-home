<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠 ฟอร์มกรอกข้อมูลเยี่ยมบ้านแสนสนุก</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .wrapper {
            background: white;
            padding: 15px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(255, 154, 158, 0.15);
            width: 100%;
            max-width: 650px;
            border: 4px solid #fecfef;
            text-align: center;
        }
        h2 { color: #ff6b81; margin-bottom: 5px; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        
        /* กล่องฝังตัว Google Form */
        iframe {
            width: 100%;
            height: 75vh;
            border: none;
            border-radius: 12px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>🏠 ระบบข้อมูลเยี่ยมบ้านออนไลน์</h2>
    <p>รบกวนนักเรียนและผู้ปกครอง เลื่อนกรอกข้อมูลและแนบรูปภาพด้านล่างนี้ให้ครบถ้วนนะจ๊ะ 😊</p>

    <!-- ⚠️ สลับเอาลิงก์ Google Form ตัวจริงของคุณครูมาใส่ตรง src ด้านล่างนี้ได้เลยครับ -->
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfv6MGSNtMAf9ZkhLyYN3sLo7Mc8y_QrJKnETWgwyE0CKUZzA/viewform?embedded=true">กำลังโหลดแบบฟอร์ม...</iframe>
</div>

</body>
</html>
